<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Habitum{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/habitum.css' %}" />
</head>
<body>

  {% if user.is_authenticated %}
  <nav class="navbar-habitum">
    <div class="container d-flex justify-content-between align-items-center">
      <a class="navbar-brand-text" href="{% url 'dashboard' %}">Habitum</a>
      <div class="d-flex align-items-center gap-2">
        <a href="{% url 'dashboard' %}" class="nav-link-habitum {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">Hoy</a>
        <a href="{% url 'historial' %}" class="nav-link-habitum {% if request.resolver_match.url_name == 'historial' %}active{% endif %}">Historial</a>
        <a href="{% url 'crear_habito' %}" class="nav-link-habitum">+ Nuevo</a>
        <span style="width:1px;height:20px;background:var(--color-border);display:inline-block;margin:0 4px;"></span>
        <span class="nav-link-habitum" style="cursor:default;color:var(--color-text) !important;">{{ user.username }}</span>
        <a href="{% url 'logout' %}" class="nav-link-habitum">Salir</a>
      </div>
    </div>
  </nav>
  {% endif %}

  {% block content %}
  {% endblock %}

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
